<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS - Flight Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="fms-container">

        <div class="fms-screen">
            <div class="screen-header">--- FLIGHT PLAN INIT ---</div>

            <div class="screen-data">
                <div>ORIGIN: <span id="view-origin">---</span></div>
                <div>DEST: <span id="view-dest">---</span></div>
                <div>ROUTE: <span id="view-route">---</span></div>
                <div>ALT: <span id="view-alt">--- FT</span></div>
            </div>

            <div class="screen-footer">MCDU MSG: <span id="scratchpad">_</span></div>
        </div>

        <div class="fms-keyboard">
            <button class="fms-btn btn-system">INIT</button>
            <button class="fms-btn btn-system">RTE</button>
            <button class="fms-btn btn-system">CLB</button>
            <button class="fms-btn btn-system">CRZ</button>
            <button class="fms-btn btn-system">DES</button>

            <button class="fms-btn" data-key="A" onclick="pressKey('A')">A</button>
            <button class="fms-btn" data-key="B" onclick="pressKey('B')">B</button>
            <button class="fms-btn" data-key="C" onclick="pressKey('C')">C</button>
            <button class="fms-btn" data-key="D" onclick="pressKey('D')">D</button>
            <button class="fms-btn" data-key="E" onclick="pressKey('E')">E</button>

            <button class="fms-btn" data-key="F" onclick="pressKey('F')">F</button>
            <button class="fms-btn" data-key="G" onclick="pressKey('G')">G</button>
            <button class="fms-btn" data-key="H" onclick="pressKey('H')">H</button>
            <button class="fms-btn" data-key="I" onclick="pressKey('I')">I</button>
            <button class="fms-btn" data-key="J" onclick="pressKey('J')">J</button>

            <button class="fms-btn" data-key="K" onclick="pressKey('K')">K</button>
            <button class="fms-btn" data-key="L" onclick="pressKey('L')">L</button>
            <button class="fms-btn" data-key="M" onclick="pressKey('M')">M</button>
            <button class="fms-btn" data-key="N" onclick="pressKey('N')">N</button>
            <button class="fms-btn" data-key="O" onclick="pressKey('O')">O</button>

            <button class="fms-btn" data-key="P" onclick="pressKey('P')">P</button>
            <button class="fms-btn" data-key="Q" onclick="pressKey('Q')">Q</button>
            <button class="fms-btn" data-key="R" onclick="pressKey('R')">R</button>
            <button class="fms-btn" data-key="S" onclick="pressKey('S')">S</button>
            <button class="fms-btn" data-key="T" onclick="pressKey('T')">T</button>

            <button class="fms-btn" data-key="U" onclick="pressKey('U')">U</button>
            <button class="fms-btn" data-key="V" onclick="pressKey('V')">V</button>
            <button class="fms-btn" data-key="W" onclick="pressKey('W')">W</button>
            <button class="fms-btn" data-key="X" onclick="pressKey('X')">X</button>
            <button class="fms-btn" data-key="Y" onclick="pressKey('Y')">Y</button>

            <button class="fms-btn" data-key="Z" onclick="pressKey('Z')">Z</button>
            <button class="fms-btn" data-key="1" onclick="pressKey('1')">1</button>
            <button class="fms-btn" data-key="2" onclick="pressKey('2')">2</button>
            <button class="fms-btn" data-key="3" onclick="pressKey('3')">3</button>
            <button class="fms-btn" data-key="4" onclick="pressKey('4')">4</button>

            <button class="fms-btn" data-key="5" onclick="pressKey('5')">5</button>
            <button class="fms-btn" data-key="6" onclick="pressKey('6')">6</button>
            <button class="fms-btn" data-key="7" onclick="pressKey('7')">7</button>
            <button class="fms-btn" data-key="8" onclick="pressKey('8')">8</button>
            <button class="fms-btn" data-key="9" onclick="pressKey('9')">9</button>

            <button class="fms-btn" data-key="0" onclick="pressKey('0')">0</button>
            <button class="fms-btn btn-system" data-key="Backspace" style="grid-column: span 2;" onclick="clearSpace()">CLR</button>
            <button class="fms-btn btn-system" data-key="Enter" style="grid-column: span 2;" onclick="executeInput()">EXEC</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
